# Mise configuration for Zammad MCP
min_version = "2024.9.5"

[settings]
auto_install = true
not_found_auto_install = true
task_run_auto_install = true

[settings.status]
show_tools = true
show_env = false
truncate = true

[tools]
python = "3.13.14"
eza = "0.23.5"
fd = "10.4.2"
rg = "15.1.0"
git-cliff = "2.13.1"
shellcheck = "0.11.0"
uv = "0.11.28"
prek = "0.4.8"

[env]
_.python.venv = { path = ".venv", create = true } # create the venv if it doesn't exist

# === Setup tasks ===
[tasks.setup]
description = "Set up complete development environment"
run = """
echo "📦 Installing Python dependencies..."
uv sync
echo "🪝 Installing pre-commit hooks..."
infisical scan install --pre-commit-hook || echo "⚠️  Infisical not available, skipping..."
if ! command -v coderabbit >/dev/null 2>&1; then
  echo "ℹ️  CodeRabbit CLI not installed. See mise.toml for installation instructions."
else
  echo "✅ coderabbit CLI already installed."
fi
echo "✅ Development environment ready!"
"""

# === Changelog tasks ===
[tasks.changelog]
description = "Update unreleased section of CHANGELOG.md"
run = """
set -euo pipefail

echo "📝 Updating CHANGELOG.md with unreleased changes..."

tmp_dir="$(mktemp -d)"
trap 'rm -rf "$tmp_dir" CHANGELOG.md.new' EXIT

# Preserve released history beginning at the first semantic-version heading.
awk '
  /^## \\[v?[0-9]+\\.[0-9]+\\.[0-9]+[^]]*\\]/ { found = 1 }
  found { print }
' CHANGELOG.md > "$tmp_dir/releases.md"

if [ ! -s "$tmp_dir/releases.md" ]; then
  echo "❌ No released-version heading found in CHANGELOG.md"
  exit 1
fi

# Replace the existing unreleased section with git-cliff output.
git-cliff --unreleased --strip header > "$tmp_dir/unreleased.md"
cat "$tmp_dir/unreleased.md" > CHANGELOG.md.new
printf '\n' >> CHANGELOG.md.new
cat "$tmp_dir/releases.md" >> CHANGELOG.md.new
mv CHANGELOG.md.new CHANGELOG.md

echo "✅ CHANGELOG.md updated!"
"""

[tasks.changelog-bump]
description = "Bump version and update changelog for a release"
usage = 'arg "<version>" help="Version number (e.g., 0.1.4)"'
run = """
echo "📝 Creating release ${usage_version}..."
git-cliff --tag "v${usage_version}" -o CHANGELOG.md
echo "✅ CHANGELOG.md updated for v${usage_version}!"
echo "Next steps:"
echo "  1. Review CHANGELOG.md"
echo "  2. Update version in pyproject.toml"
echo "  3. Commit changes: git add CHANGELOG.md pyproject.toml && git commit -m 'chore: release v${usage_version}'"
echo "  4. Tag release: git tag -a v${usage_version} -m 'Release v${usage_version}'"
echo "  5. Push: git push && git push --tags"
"""

# === Python tasks ===
[tasks.python-clean]
description = "Clean development environment"
run = """
rm -rf .venv
rm -rf requirements.lock
"""

[tasks.python-upgrade]
description = "Upgrade Python dependencies"
run = "uv lock --upgrade"

[tasks.python-install]
description = "Install Python dependencies"
run = "uv sync"

# === Hooks tasks ===
[tasks.hooks-install]
description = "Install pre-commit and infisical hooks"
run = "prek install && infisical scan install --pre-commit-hook"

[tasks.pre-commit-run]
description = "Run pre-commit hooks"
run = "prek run --all-files"

# === Infisical tasks ===
[tasks.infisical-scan]
description = "Scan repository for secrets and sensitive data"
run = "infisical scan"

[tasks.markdown-lint]
description = "Lint Markdown files"
run = "prek run rumdl --all-files"

[tasks.markdown-fix]
description = "Fix Markdown files"
run = "prek run rumdl-fmt --all-files --hook-stage manual"

[tasks.validate-renovate]
description = "Validate Renovate configuration"
run = "npx --yes --package renovate -- renovate-config-validator --strict"
